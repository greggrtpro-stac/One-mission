<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- ?v=2 : contourne le cache favicon des navigateurs (l'ancienne icône
         orange était servie à la même URL — incrémenter si le logo change). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Accent violet officiel : #8B5CF6 (sombre) / #7C3AED (clair). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#7c3aed" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta
      name="description"
      content="One Mission — transforme tes objectifs en quêtes, ta discipline en XP et tes journées en progression mesurable."
    />
    <title>One Mission — Ta vie, une quête à la fois</title>

    <!-- Open Graph / partage social. og:url et og:image nécessitent le domaine
         et un visuel définitifs : à compléter avant la mise en production. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="One Mission" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="One Mission — Ta vie, une quête à la fois" />
    <meta
      property="og:description"
      content="Transforme tes objectifs en quêtes, ta discipline en XP et tes journées en progression mesurable."
    />
    <meta name="twitter:card" content="summary" />
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Ce fichier ne fonctionne jamais ouvert directement (file://) : les
      // modules ES et les imports relatifs de Vite exigent un vrai serveur
      // HTTP. Sans ce garde-fou, l'utilisateur ne voit qu'une page blanche
      // avec des erreurs CORS/ERR_FAILED illisibles dans la console.
      if (location.protocol === 'file:') {
        document.body.innerHTML =
          '<div style="min-height:100vh;display:flex;flex-direction:column;' +
          'align-items:center;justify-content:center;gap:1rem;padding:2rem;' +
          'text-align:center;background:#0a0a0d;color:#f5f5f5;' +
          'font-family:system-ui,sans-serif;">' +
          '<span style="font-size:2.5rem;">⚠️</span>' +
          '<h1 style="font-size:1.4rem;font-weight:700;margin:0;">Ce fichier ne doit pas être ouvert directement</h1>' +
          '<p style="max-width:480px;color:#a3a3a3;font-size:0.95rem;">' +
          'One Mission a besoin d\'un serveur pour fonctionner. Double-clique sur ' +
          '<b>demarrer.bat</b> à la racine du projet : le site s\'ouvrira tout seul ' +
          'à la bonne adresse (<b>http://localhost:5173</b>).</p>' +
          '</div>'
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
